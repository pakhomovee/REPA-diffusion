# Step 1 — REPA + DINOv2-B, 10% ImageNet, SiT-S/2, 64x64
# Core baseline-reproduction experiment at low resolution.
# Note: pixel images are upsampled to 224px before DINOv2 forward pass
# (handled inside models/teachers.py) since DINOv2 expects >= 224px input.
# Compare FID-vs-step curve against baseline_imagenet_10pct_64px.

experiment_name: repa_dinov2_imagenet_01pct_256px

# Data
dataset: imagenet
data_root: data/imagenet
cache_dir: cache/imagenet_f001_r256/train
fraction: 0.10
resolution: 256
num_classes: 1000

# Model
model_size: S        # SiT-S: 12 transformer blocks, hidden_size=384
in_channels: 4
patch_size: 2        # 8x8 latent / 2 = 4x4 = 16 tokens

# Teacher
teacher: dinov2      # DINOv2-B: patch_size=14, feature_dim=768
align_layer: 6       # mid-level block (out of 12); consistent with REPA paper
lambda: 0.5

# Training
total_steps: 400000
batch_size: 256
lr: 1.0e-4
weight_decay: 0.0
adam_betas: [0.9, 0.999]
grad_clip: 1.0
ema_decay: 0.9999
mixed_precision: true
seed: 42
num_workers: 8

# Checkpointing & logging
checkpoint_dir: checkpoints/repa_dinov2_imagenet_10pct_64px
save_every: 20000
log_every: 100