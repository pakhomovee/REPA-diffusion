name: Build LaTeX PDFs

# Runs when changes land on main (including PR merges). PDF commits do not
# retrigger this workflow because the publish commit uses [skip ci].
on:
  push:
    branches:
      - main
    paths:
      - "tex/**"
      - ".github/workflows/latex.yml"

permissions:
  contents: write

concurrency:
  group: latex-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compile report (pdfLaTeX + Biber)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: tex/report
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Compile poster (XeLaTeX)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: tex/poster
          # Fonts (Lato/Raleway) are vendored in tex/poster/fonts and loaded by
          # relative path, so no system fonts or fontconfig setup is required.
          args: -xelatex -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Publish PDFs on repository root
        run: |
          cp tex/report/main.pdf report.pdf
          cp tex/poster/main.pdf poster.pdf
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add report.pdf poster.pdf
          if git diff --staged --quiet; then
            echo "PDFs unchanged; nothing to commit."
          else
            git commit -m "chore: update compiled PDFs [skip ci]"
            git push
          fi
